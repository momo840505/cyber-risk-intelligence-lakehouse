name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install lightweight runtime dependencies
        run: |
          python -m pip install pandas pyarrow streamlit plotly requests pyspark

      - name: Install project package
        run: |
          python -m pip install -e .

      - name: Compile Python source files
        run: |
          python -m compileall src scripts app

      - name: Import package modules
        run: |
          python -c "import cyber_risk; print('cyber_risk package import OK')"
