services:
  cyber-risk-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cyber-risk-intelligence-api:latest
    container_name: cyber-risk-intelligence-api
    ports:
      - "8001:8000"
    volumes:
      - ./analytics:/app/analytics:ro
      - ./models:/app/models:ro
      - ./monitoring:/app/monitoring
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
